<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h3 class="auth-title">ĐĂNG KÝ HỌC VIÊN</h3>
            
            <div id="alertBox" class="alert d-none" role="alert"></div>

            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label text-muted">Tên đăng nhập</label>
                    <input type="text" id="username" class="form-control" required placeholder="Nhập ít nhất 4 ký tự">
                </div>
                
                <div class="mb-3">
                    <label class="form-label text-muted">Email liên hệ</label>
                    <input type="email" id="email" class="form-control" required placeholder="example@gmail.com">
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted">Số điện thoại</label>
                    <input type="text" id="phoneNumber" class="form-control" placeholder="0123456789 (Không bắt buộc)">
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted">Mật khẩu</label>
                    <input type="password" id="password" class="form-control" required placeholder="Ít nhất 6 ký tự">
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted">Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" class="form-control" required placeholder="Nhập lại mật khẩu">
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-3" id="registerBtn">ĐĂNG KÝ NGAY</button>
                
                <div class="text-center text-muted" style="font-size: 14px;">
                    Đã có tài khoản? <a href="login.html" class="text-decoration-none fw-bold">Đăng nhập</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const phoneNumber = document.getElementById('phoneNumber').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('registerBtn');
            const alertBox = document.getElementById('alertBox');

            // Kiểm tra mật khẩu khớp nhau ở Frontend
            if (password !== confirmPassword) {
                showAlert('Mật khẩu xác nhận không trùng khớp!', 'danger');
                return;
            }

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Đang xử lý...';
                
                await fetchWithAuth('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({ 
                        username, 
                        email, 
                        phoneNumber, 
                        password, 
                        role: "student" // Đính kèm ngầm quyền học viên
                    })
                });

                // Đăng ký thành công
                showAlert('Đăng ký thành công! Đang chuyển hướng về trang Đăng nhập...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                showAlert(error.message, 'danger');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'ĐĂNG KÝ NGAY';
            }
        });

        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${type}`; // danger hoặc success
            alertBox.textContent = message;
            alertBox.classList.remove('d-none');
        }
    </script>
</body>
</html>
