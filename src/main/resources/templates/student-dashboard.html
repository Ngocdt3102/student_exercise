<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng thông tin Sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .nav-pills .nav-link {
            color: var(--text-muted);
            border-radius: 8px;
            margin-bottom: 5px;
            padding: 12px 20px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .nav-pills .nav-link.active {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3);
        }
        .nav-pills .nav-link:hover:not(.active) {
            background-color: #e9ecef;
        }
        .readonly-field {
            background-color: #e9ecef !important;
            cursor: not-allowed;
            color: #495057;
            font-weight: 500;
        }
        .section-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">CỔNG THÔNG TIN SINH VIÊN</a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3" id="studentNameDisplay">Xin chào, Sinh viên</span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Đăng xuất</button>
            </div>
        </div>
    </nav>

    <div class="container dashboard-container mt-4">
        <div id="mainAlert" class="alert d-none" role="alert"></div>

        <div class="row">
            <div class="col-md-3 mb-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-3">
                        <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist" aria-orientation="vertical">
                            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-profile" type="button" role="tab">
                                👤 Hồ sơ cá nhân
                            </button>
                            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-classmates" type="button" role="tab" onclick="loadClassmates()">
                                👥 Bạn cùng lớp
                            </button>
                            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-security" type="button" role="tab">
                                🔒 Đổi mật khẩu
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="card border-0 shadow-sm tab-content" id="v-pills-tabContent">
                    
                    <div class="tab-pane fade show active p-4" id="tab-profile" role="tabpanel">
                        <form id="profileForm">
                            
                            <div class="mb-4">
                                <h5 class="fw-bold text-primary section-title mb-3">Thông Tin Học Vụ</h5>
                                <div class="row bg-light p-3 rounded border">
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label text-muted small">Mã Sinh Viên</label>
                                        <input type="text" id="profCode" class="form-control form-control-sm readonly-field" readonly>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label text-muted small">Lớp Sinh Hoạt</label>
                                        <input type="text" id="profClass" class="form-control form-control-sm readonly-field" readonly>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label text-muted small">Trạng Thái</label>
                                        <input type="text" id="profStatus" class="form-control form-control-sm readonly-field text-danger fw-bold" readonly>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label text-muted small">Khoa</label>
                                        <input type="text" id="profFaculty" class="form-control form-control-sm readonly-field" readonly>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label text-muted small">Chuyên Ngành</label>
                                        <input type="text" id="profMajor" class="form-control form-control-sm readonly-field" readonly>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label text-muted small">Điểm Tích Lũy (GPA)</label>
                                        <input type="text" id="profGpa" class="form-control form-control-sm readonly-field text-primary fw-bold" readonly>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <h5 class="fw-bold text-primary section-title mb-3">Thông Tin Cá Nhân</h5>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Họ và Tên <span class="text-danger">*</span></label>
                                        <input type="text" id="profName" class="form-control" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">Email liên hệ <span class="text-danger">*</span></label>
                                        <input type="email" id="profEmail" class="form-control" required>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label fw-bold">Ngày sinh <span class="text-danger">*</span></label>
                                        <input type="date" id="profDob" class="form-control" required>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label fw-bold">Giới tính <span class="text-danger">*</span></label>
                                        <select id="profGender" class="form-control" required>
                                            <option value="" disabled>Chọn giới tính</option>
                                            <option value="Nam">Nam</option>
                                            <option value="Nữ">Nữ</option>
                                            <option value="Khác">Khác</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label fw-bold">Số CCCD <span class="text-danger">*</span></label>
                                        <input type="text" id="profNationalId" class="form-control" required maxlength="12">
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label class="form-label fw-bold">Số điện thoại</label>
                                        <input type="text" id="profPhone" class="form-control">
                                    </div>
                                    <div class="col-md-8 mb-3">
                                        <label class="form-label fw-bold">Quê quán</label>
                                        <input type="text" id="profHometown" class="form-control" placeholder="VD: Nghệ An, Việt Nam">
                                    </div>
                                    <div class="col-md-12 mb-3">
                                        <label class="form-label fw-bold">Địa chỉ hiện tại</label>
                                        <input type="text" id="profAddress" class="form-control" placeholder="Địa chỉ thường trú / tạm trú">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="text-end border-top pt-3">
                                <button type="submit" class="btn btn-primary px-5 fw-bold" id="btnUpdateProfile">LƯU CẬP NHẬT</button>
                            </div>
                        </form>
                    </div>

                    <div class="tab-pane fade p-4" id="tab-classmates" role="tabpanel">
                        <h4 class="fw-bold text-primary mb-4">Danh Sách Lớp <span id="displayClassName" class="text-danger"></span></h4>
                        <div class="table-responsive table-custom">
                            <table class="table mb-0">
                                <thead>
                                    <tr>
                                        <th>Mã SV</th>
                                        <th>Họ và Tên</th>
                                        <th>Email</th>
                                        <th>Trạng thái</th>
                                    </tr>
                                </thead>
                                <tbody id="classmatesTableBody">
                                    <tr><td colspan="4" class="text-center">Đang tải dữ liệu...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="tab-pane fade p-4" id="tab-security" role="tabpanel">
                        <h4 class="fw-bold text-primary mb-4">Bảo Mật Tài Khoản</h4>
                        <div class="row">
                            <div class="col-md-8">
                                <form id="changePasswordForm">
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Mật khẩu hiện tại</label>
                                        <input type="password" id="oldPassword" class="form-control" required placeholder="Nhập mật khẩu đang sử dụng">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-bold text-primary">Mật khẩu mới</label>
                                        <input type="password" id="newPassword" class="form-control" required placeholder="Ít nhất 6 ký tự">
                                    </div>
                                    <div class="mb-4">
                                        <label class="form-label fw-bold text-primary">Xác nhận mật khẩu mới</label>
                                        <input type="password" id="confirmNewPassword" class="form-control" required placeholder="Nhập lại mật khẩu mới">
                                    </div>
                                    <button type="submit" class="btn btn-primary px-4" id="btnChangePassword">Đổi Mật Khẩu</button>
                                </form>
                            </div>
                            <div class="col-md-4">
                                <div class="alert alert-info" style="font-size: 14px;">
                                    <strong>Lưu ý:</strong>
                                    <ul class="mb-0 mt-2 ps-3">
                                        <li>Mật khẩu nên chứa cả chữ và số.</li>
                                        <li>Hệ thống sẽ yêu cầu đăng nhập lại sau khi đổi mật khẩu thành công.</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        const role = localStorage.getItem('role');
        const userId = localStorage.getItem('userId');
        let myClassName = ""; 

        if (role !== 'student') {
            alert("Bạn không có quyền truy cập trang này!");
            window.location.href = 'login.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('studentNameDisplay').textContent = `Xin chào, ${localStorage.getItem('username')}`;
            loadProfile();
        });

        // ==========================================
        // 1. TẢI HỒ SƠ VÀ ĐIỀN VÀO FORM
        // ==========================================
        async function loadProfile() {
            try {
                const data = await fetchWithAuth(`/students/${userId}`);
                
                // --- Đổ dữ liệu Readonly (Học vụ) ---
                document.getElementById('profCode').value = data.studentCode || 'N/A';
                document.getElementById('profClass').value = data.className || 'Chưa phân lớp';
                document.getElementById('profFaculty').value = data.faculty || 'Chưa cập nhật';
                document.getElementById('profMajor').value = data.major || 'Chưa cập nhật';
                document.getElementById('profGpa').value = data.cumulativeGpa !== null ? data.cumulativeGpa : 'N/A';
                document.getElementById('profStatus').value = data.academicStatus || 'Đang học';
                
                // --- Đổ dữ liệu Editable (Cá nhân) ---
                document.getElementById('profName').value = data.fullName || '';
                document.getElementById('profEmail').value = data.email || '';
                document.getElementById('profDob').value = data.dateOfBirth || '';
                document.getElementById('profGender').value = data.gender || '';
                document.getElementById('profNationalId').value = data.nationalId || '';
                document.getElementById('profPhone').value = data.phoneNumber || '';
                document.getElementById('profHometown').value = data.hometown || '';
                document.getElementById('profAddress').value = data.address || '';

                myClassName = data.className || '';
                document.getElementById('displayClassName').textContent = `[${myClassName}]`;
            } catch (error) {
                showMainAlert("Lỗi tải thông tin cá nhân: " + error.message, "danger");
            }
        }

        // ==========================================
        // 2. CẬP NHẬT HỒ SƠ (Gửi toàn bộ thông tin cá nhân)
        // ==========================================
        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnUpdateProfile');
            
            // Gom toàn bộ các trường được phép chỉnh sửa
            const dto = {
                fullName: document.getElementById('profName').value,
                email: document.getElementById('profEmail').value,
                dateOfBirth: document.getElementById('profDob').value,
                gender: document.getElementById('profGender').value,
                nationalId: document.getElementById('profNationalId').value,
                phoneNumber: document.getElementById('profPhone').value,
                hometown: document.getElementById('profHometown').value,
                address: document.getElementById('profAddress').value
            };

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Đang lưu...';
                
                await fetchWithAuth(`/students/${userId}`, {
                    method: 'PUT',
                    body: JSON.stringify(dto)
                });
                
                showMainAlert("Cập nhật thông tin cá nhân thành công!", "success");
            } catch (error) {
                showMainAlert(error.message, "danger");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'LƯU CẬP NHẬT';
            }
        });

        // ==========================================
        // 3. TẢI DANH SÁCH BẠN CÙNG LỚP
        // ==========================================
        async function loadClassmates() {
            if (!myClassName || myClassName === 'Chưa phân lớp') {
                document.getElementById('classmatesTableBody').innerHTML = '<tr><td colspan="4" class="text-center text-muted">Bạn chưa được phân lớp.</td></tr>';
                return;
            }

            try {
                const response = await fetchWithAuth(`/students?pageNo=0&pageSize=100`);
                const classmates = response.content.filter(sv => sv.className === myClassName);
                const tbody = document.getElementById('classmatesTableBody');
                tbody.innerHTML = '';

                if (classmates.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center">Lớp hiện tại chưa có thành viên nào khác.</td></tr>';
                    return;
                }

                classmates.forEach(sv => {
                    const isMe = sv.userId === userId ? 'class="table-primary"' : '';
                    const meLabel = sv.userId === userId ? ' <span class="badge bg-danger ms-1">Bạn</span>' : '';
                    
                    let statusColor = '#198754';
                    if (sv.academicStatus === 'Đình chỉ') statusColor = '#dc3545';
                    else if (sv.academicStatus === 'Bảo lưu') statusColor = '#ffc107';

                    tbody.innerHTML += `
                        <tr ${isMe}>
                            <td class="fw-bold">${sv.studentCode || 'N/A'}</td>
                            <td>${sv.fullName || 'Chưa cập nhật'}${meLabel}</td>
                            <td>${sv.email}</td>
                            <td><span class="badge-active" style="background-color: ${statusColor}; color: ${sv.academicStatus==='Bảo lưu'?'black':'white'}">${sv.academicStatus || 'Đang học'}</span></td>
                        </tr>
                    `;
                });
            } catch (error) {
                showMainAlert("Không thể tải danh sách lớp: " + error.message, "danger");
            }
        }

        // ==========================================
        // 4. ĐỔI MẬT KHẨU
        // ==========================================
        document.getElementById('changePasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnChangePassword');
            
            const dto = {
                oldPassword: document.getElementById('oldPassword').value,
                newPassword: document.getElementById('newPassword').value,
                confirmNewPassword: document.getElementById('confirmNewPassword').value
            };

            if (dto.newPassword !== dto.confirmNewPassword) {
                showMainAlert("Mật khẩu xác nhận không khớp!", "danger");
                return;
            }

            try {
                btn.disabled = true;
                btn.textContent = 'Đang xử lý...';
                
                await fetchWithAuth(`/auth/change-password/${userId}`, {
                    method: 'PUT',
                    body: JSON.stringify(dto)
                });
                
                alert("Đổi mật khẩu thành công! Vui lòng đăng nhập lại.");
                logout(); 
            } catch (error) {
                showMainAlert(error.message, "danger");
            } finally {
                btn.disabled = false;
                btn.textContent = 'Đổi Mật Khẩu';
            }
        });

        function showMainAlert(message, type) {
            const alertBox = document.getElementById('mainAlert');
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
            alertBox.classList.remove('d-none');
            setTimeout(() => alertBox.classList.add('d-none'), 4000);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
