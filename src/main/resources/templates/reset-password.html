<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h3 class="auth-title">ĐẶT LẠI MẬT KHẨU</h3>
            <p class="text-muted text-center mb-4" style="font-size: 14px;">Vui lòng kiểm tra Console (Backend) để lấy mã OTP 6 số.</p>
            
            <div id="alertBox" class="alert d-none" role="alert"></div>

            <form id="resetForm">
                <div class="mb-3">
                    <label class="form-label text-muted text-primary fw-bold">Mã xác nhận OTP (6 số)</label>
                    <input type="text" id="token" class="form-control" required placeholder="Ví dụ: 123456" maxlength="6" style="letter-spacing: 2px; font-weight: bold; text-align: center;">
                </div>
                
                <div class="mb-3">
                    <label class="form-label text-muted">Mật khẩu mới</label>
                    <input type="password" id="newPassword" class="form-control" required placeholder="Ít nhất 6 ký tự">
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted">Xác nhận mật khẩu mới</label>
                    <input type="password" id="confirmNewPassword" class="form-control" required placeholder="Nhập lại mật khẩu mới">
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-3" id="resetBtn">XÁC NHẬN ĐỔI MẬT KHẨU</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const token = document.getElementById('token').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmNewPassword = document.getElementById('confirmNewPassword').value;
            const btn = document.getElementById('resetBtn');
            const alertBox = document.getElementById('alertBox');

            if (newPassword !== confirmNewPassword) {
                showAlert('Mật khẩu xác nhận không khớp!', 'danger');
                return;
            }

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Đang xử lý...';
                
                // Tương tự, API này trả về Text (String) nên dùng fetch thuần
                const response = await fetch(`${BASE_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword, confirmNewPassword })
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.message || 'Lỗi đặt lại mật khẩu');
                }

                showAlert('Đặt lại mật khẩu thành công! Chuyển về trang đăng nhập...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                showAlert(error.message, 'danger');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'XÁC NHẬN ĐỔI MẬT KHẨU';
            }
        });

        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
            alertBox.classList.remove('d-none');
        }
    </script>
</body>
</html>
