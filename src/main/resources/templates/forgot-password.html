<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h3 class="auth-title">QUÊN MẬT KHẨU</h3>
            <p class="text-muted text-center mb-4" style="font-size: 14px;">Vui lòng nhập email đã đăng ký để nhận mã OTP khôi phục.</p>
            
            <div id="alertBox" class="alert d-none" role="alert"></div>

            <form id="forgotForm">
                <div class="mb-4">
                    <label class="form-label text-muted">Email liên hệ</label>
                    <input type="email" id="email" class="form-control" required placeholder="Nhập email của bạn">
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-3" id="forgotBtn">GỬI MÃ OTP</button>
                
                <div class="text-center text-muted" style="font-size: 14px;">
                    <a href="login.html" class="text-decoration-none fw-bold">Quay lại Đăng nhập</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const btn = document.getElementById('forgotBtn');
            const alertBox = document.getElementById('alertBox');

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Đang gửi...';
                
                // Vì API Backend trả về chữ String (chứ không phải JSON) ở hàm này,
                // chúng ta dùng fetch thuần thay vì fetchWithAuth để tránh lỗi parse JSON.
                const response = await fetch(`${BASE_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.message || 'Lỗi hệ thống');
                }

                alertBox.className = 'alert alert-success';
                alertBox.textContent = 'Mã OTP đã được gửi! Chuyển trang nhập mã sau 3 giây...';
                alertBox.classList.remove('d-none');

                setTimeout(() => {
                    // Chuyển sang trang đặt lại mật khẩu và truyền sẵn email lên URL cho tiện
                    window.location.href = `reset-password.html`;
                }, 3000);

            } catch (error) {
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = error.message;
                alertBox.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'GỬI MÃ OTP';
            }
        });
    </script>
</body>
</html>
