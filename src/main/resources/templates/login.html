<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h3 class="auth-title">HỆ THỐNG QUẢN LÝ</h3>
            
            <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-muted">Tên đăng nhập</label>
                    <input type="text" id="username" class="form-control" required placeholder="Nhập mã sinh viên hoặc admin">
                </div>
                
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label text-muted">Mật khẩu</label>
                        <a href="forgot-password.html" class="text-decoration-none" style="font-size: 14px;">Quên mật khẩu?</a>
                    </div>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-3" id="loginBtn">ĐĂNG NHẬP</button>
                
                <div class="text-center text-muted" style="font-size: 14px;">
                    Chưa có tài khoản? <a href="register.html" class="text-decoration-none fw-bold">Đăng ký ngay</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Chặn reload trang
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const alertBox = document.getElementById('errorAlert');

            try {
                // Hiệu ứng loading
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Đang xử lý...';
                alertBox.classList.add('d-none');

                // Gọi API Login qua file api.js
                const response = await fetchWithAuth('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ username, password })
                });

                // Lưu dữ liệu vào trình duyệt
                localStorage.setItem('accessToken', response.accessToken);
                localStorage.setItem('userId', response.userId);
                localStorage.setItem('role', response.role);
                localStorage.setItem('username', response.username);

                // Điều hướng dựa trên Role
                if (response.role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'student-dashboard.html';
                }

            } catch (error) {
                // Hiển thị lỗi từ Backend ra màn hình
                alertBox.textContent = error.message;
                alertBox.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'ĐĂNG NHẬP';
            }
        });
    </script>
</body>
</html>
