spring.application.name=student_exercise

# ==============================================================
# 1. CẤU HÌNH KẾT NỐI DATABASE (SQL SERVER)
# ==============================================================
# Thông tin Database từ file SQL: STUDENT_EXERCISE
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=STUDENT_EXERCISE;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=Ngoc3103@!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==============================================================
# 2. CẤU HÌNH JPA / HIBERNATE
# ==============================================================
# Sử dụng Dialect của SQL Server
spring.jpa.database-platform=org.hibernate.dialect.SQLServer2016Dialect

# 'none' hoặc 'validate': Hibernate sẽ KHÔNG tự động tạo/sửa bảng (vì bạn đã có file SQL)
spring.jpa.hibernate.ddl-auto=none

# Hiển thị log các câu lệnh SQL trên console để dễ debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true

# ==============================================================
# 3. CẤU HÌNH SERVER
# ==============================================================
server.port=8080