spring.application.name=student_exercise
server.port=8080

# ==============================================================
# 1. CẤU HÌNH KẾT NỐI DATABASE (SQL SERVER)
# ==============================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=STUDENT_EXERCISE;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=Ngoc3103@!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==============================================================
# 2. CẤU HÌNH JPA / HIBERNATE ORM
# ==============================================================
# Sử dụng Dialect chuẩn của Hibernate 6 cho SQL Server
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# 'update': Tự động đối chiếu Entity và DB để cập nhật cột thiếu mà không xóa dữ liệu
spring.jpa.hibernate.ddl-auto=update

# Hiển thị log các câu lệnh SQL trên console để dễ debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true

# ==============================================================
# 3. CẤU HÌNH ĐỊNH DẠNG VÀ MÃ HÓA (Bắt buộc cho Tiếng Việt)
# ==============================================================
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# =========================================================================
# 4. CẤU HÌNH JWT BẢO MẬT
# =========================================================================
# Khóa bí mật (Tuyệt đối không để lộ mã này ra ngoài thực tế)
jwt.secret=StudentExerciseSuperSecretKeyForJwtAuthentication31032005!@#
# Thời gian sống của Token (Tính bằng mili-giây: 86400000 = 24 giờ)
jwt.expiration=86400000